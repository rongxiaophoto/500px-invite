<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>领取专属邀请函</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: #f3f5f9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 16px 40px;
      color: #111;
    }

    .wrap {
      width: 100%;
      max-width: 460px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.08);
      padding: 24px 18px 20px;
      margin-bottom: 16px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .input {
      width: 100%;
      height: 48px;
      border: 1px solid #d9dce3;
      border-radius: 12px;
      padding: 0 14px;
      font-size: 16px;
      margin-bottom: 12px;
      outline: none;
      background: #fff;
    }

    .input:focus {
      border-color: #111;
    }

    .btn {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 12px;
      background: #111;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:active {
      transform: scale(0.99);
    }

    .msg {
      min-height: 22px;
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
      color: #d93025;
    }

    .msg.success {
      color: #0b7a39;
    }

    .result {
      display: none;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.08);
      padding: 16px;
    }

    .invite-img {
      width: 100%;
      display: block;
      border-radius: 16px;
    }

    .tip {
      text-align: center;
      color: #666;
      font-size: 13px;
      margin-top: 12px;
      line-height: 1.7;
    }

    .download-btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 44px;
      margin-top: 12px;
      border-radius: 12px;
      background: #111;
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
    }

    canvas {
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">领取专属邀请函</div>
      <div class="subtitle">输入 500px 用户名 + 手机号后四位，自动生成专属邀请函</div>

      <input id="username" class="input" type="text" placeholder="请输入 500px 用户名" />
      <input id="phoneLast4" class="input" type="text" maxlength="4" inputmode="numeric" placeholder="请输入手机号后四位" />

      <button id="generateBtn" class="btn">立即生成邀请函</button>

      <div id="msg" class="msg"></div>
    </div>

    <div id="result" class="result">
      <img id="invitePreview" class="invite-img" alt="专属邀请函" />
      <div class="tip">已为你生成专属邀请函，可长按保存，或点击下方按钮下载</div>
      <a id="downloadBtn" class="download-btn" download="邀请函.jpg">下载邀请函</a>
    </div>

    <canvas id="canvas"></canvas>
  </div>

  <script>
    // 手动维护数据
    const data = [
      { username: "xiaorong", phoneLast4: "1234" },
      { username: "zhangsan", phoneLast4: "5678" },
      { username: "王红", phoneLast4: "1234" },
      { username: "李四", phoneLast4: "1234" },
      { username: "wang", phoneLast4: "1234" }
    ];

    // 邀请函底图文件名
    const bgImagePath = "./invitation-bg.jpg";

    const usernameInput = document.getElementById("username");
    const phoneLast4Input = document.getElementById("phoneLast4");
    const generateBtn = document.getElementById("generateBtn");
    const msgEl = document.getElementById("msg");
    const resultEl = document.getElementById("result");
    const invitePreviewEl = document.getElementById("invitePreview");
    const downloadBtnEl = document.getElementById("downloadBtn");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    phoneLast4Input.addEventListener("input", function () {
      this.value = this.value.replace(/\D/g, "").slice(0, 4);
    });

    function resetUI() {
      msgEl.textContent = "";
      msgEl.className = "msg";
      resultEl.style.display = "none";
      invitePreviewEl.src = "";
      downloadBtnEl.href = "";
    }

    function setError(text) {
      msgEl.textContent = text;
      msgEl.className = "msg";
    }

    function setSuccess(text) {
      msgEl.textContent = text;
      msgEl.className = "msg success";
    }

    function findUser(username, phoneLast4) {
      return data.find(item =>
        String(item.username).trim() === username &&
        String(item.phoneLast4).trim() === phoneLast4
      );
    }

    function drawUsernameOnCanvas(bgImg, username) {
      canvas.width = bgImg.naturalWidth;
      canvas.height = bgImg.naturalHeight;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

      const centerX = canvas.width / 2;

      // 用户名位置：偏上方中心，可继续微调
      const nameY = canvas.height * 0.298;

      // 字号自适应
      let fontSize = Math.floor(canvas.width * 0.09);
      if (username.length >= 5) fontSize = Math.floor(canvas.width * 0.078);
      if (username.length >= 7) fontSize = Math.floor(canvas.width * 0.068);

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `700 ${fontSize}px "PingFang SC", "Microsoft YaHei", sans-serif`;

      // 阴影增强可读性
      ctx.shadowColor = "rgba(0, 0, 0, 0.22)";
      ctx.shadowBlur = 20;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 4;

      // 主文字
      ctx.fillStyle = "#FFFFFF";
      ctx.fillText(username, centerX, nameY);

      // 轻微描边
      ctx.lineWidth = Math.max(2, Math.floor(fontSize * 0.035));
      ctx.strokeStyle = "rgba(255,255,255,0.22)";
      ctx.strokeText(username, centerX, nameY);

      // 清理阴影
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
    }

    generateBtn.addEventListener("click", function () {
      resetUI();

      const username = usernameInput.value.trim();
      const phoneLast4 = phoneLast4Input.value.trim();

      if (!username) {
        setError("请输入 500px 用户名");
        return;
      }

      if (!/^\d{4}$/.test(phoneLast4)) {
        setError("请输入正确的手机号后四位");
        return;
      }

      const matchedUser = findUser(username, phoneLast4);
      if (!matchedUser) {
        setError("未查询到该用户信息，请核对用户名和手机号后四位");
        return;
      }

      const bgImg = new Image();

      bgImg.onload = function () {
        drawUsernameOnCanvas(bgImg, matchedUser.username);

        const jpgDataUrl = canvas.toDataURL("image/jpeg", 0.95);

        invitePreviewEl.src = jpgDataUrl;
        downloadBtnEl.href = jpgDataUrl;
        downloadBtnEl.download = `${matchedUser.username}-邀请函.jpg`;
        resultEl.style.display = "block";
        setSuccess("邀请函生成成功");
      };

      bgImg.onerror = function () {
        setError("邀请函底图加载失败，请检查 invitation-bg.jpg 是否存在");
      };

      bgImg.src = bgImagePath;
    });
  </script>
</body>
</html>
