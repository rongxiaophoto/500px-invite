.spinner{

// 核心函数
function generate(){

  const username = document.getElementById("username").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const msg = document.getElementById("msg");
  const loading = document.getElementById("loading");

  msg.innerHTML = "";

  if(!username || phone.length!==4){
    msg.innerText = "请输入正确的信息";
    return;
  }

  const user = data.find(item =>
    item.username === username && item.phoneLast4 === phone
  );

  if(!user){
    msg.innerHTML = `
    暂未查询到您的邀请函<br>
    <span style="font-size:12px;color:#999;">
    如您已完成报名，数据将在12小时内同步，请稍后再试
    </span>
    `;
    return;
  }

  loading.style.display = "flex";

  const img = new Image();
  img.src = "invitation-bg.jpg";

  img.onload = function(){

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img,0,0);

    // ⭐ 用户名位置（已改为 0.28）
    const centerX = canvas.width / 2;
    const nameY = canvas.height * 0.28;

    ctx.fillStyle = "#fff";
    ctx.font = "bold 90px PingFang SC";
    ctx.textAlign = "center";

    ctx.fillText(username, centerX, nameY);

    const base64 = canvas.toDataURL("image/jpeg");

    document.getElementById("img").src = base64;
    document.getElementById("result").style.display = "block";

    loading.style.display = "none";
  };

  img.onerror = function(){
    loading.style.display = "none";
    msg.innerText = "底图加载失败，请检查 invitation-bg.jpg";
  };
}
